[fonts]
score_font = dependencies\font\dot-style\PressStart2P-Regular.ttf
combo_font = dependencies\font\dot-style\Jersey25-Regular.ttf
judge_font = dependencies\font\dot-style\Jersey25-Regular.ttf

[output]
output_dir = output\judge_color_previews\A_original_bright
stretch_to_original_size = true
dry_run = false

[layout]
x_padding = 3
y_padding = 1

[score]
score_fill = #ffffff,#dffcff
score_stroke = #20204aff
score_stroke_width = 0
score_n_fill = #b8b8cfff

[score_shadow]
score_s_fill = #050505ff
score_s_stroke = #000000ff
score_s_stroke_width = 1
score_s_blur = #000000bb
score_s_blur_radius = 3
score_s_blur_spread = 1

[combo_front]
combo_p_fill = #ffffff,#ffe6ff,#ffaaff
combo_p_stroke = #e86bec
combo_stroke_width = 6

[combo_back]
combo_b_fill = #96968cff
combo_b_stroke = #64645cff
combo_b_stroke_width = 2
combo_b_blur = #96968ccc
combo_b_blur_radius = 16
combo_b_blur_spread = 2

[dot]
dot_as_shape = true
dot_scale = 0.72
dot_shape = square
dot_roundness = 0.35

[judge]
judge_perfect_fill = #5ffff0,#e6d7ff,#fff8b8
judge_great_fill = #ff89ff,#ffc6ff
judge_good_fill = #7adcff,#3db9ff
judge_bad_fill = #67ffc0,#4ee39b
judge_miss_fill = #ffffff,#d4d4d4
judge_auto_fill = #efff78,#b9ff5c
judge_stroke = #00000000
judge_stroke_width = 0
judge_blur = #000000aa
judge_blur_radius = 6
judge_blur_spread = 1

