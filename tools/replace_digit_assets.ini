[fonts]
score_font = dependencies\font\dot-style\PressStart2P-Regular.ttf
combo_font = dependencies\font\dot-style\Jersey25-Regular.ttf
judge_font = dependencies\font\dot-style\Jersey25-Regular.ttf
rank_font = dependencies\font\dot-style\Jersey25-Regular.ttf
life_font = dependencies\font\dot-style\PressStart2P-Regular.ttf
score_ui_font = dependencies\font\dot-style\PressStart2P-Regular.ttf
life_ui_font = dependencies\font\dot-style\Jersey25-Regular.ttf
auto_ui_font = dependencies\font\dot-style\Jersey25-Regular.ttf

[ui_theme]
; Named colors: green, blue, purple, cyan, pink, rainbow. Hex colors such as #4f8cff are also accepted.
ui_theme_mode = detailed
ui_theme_color = #c7c413
score_auto_theme_color = #00e9a3
life_theme_color = #00f050
combo_theme_color = rainbow
judge_theme_color = rainbow
; Judge text/stroke colors stay as defined in [judge]; this affects the outer blur only.
ui_panel_opacity = 0.62
ui_accent_opacity = 0.92

[output]
output_dir = output\assets
copy_assets = true
stretch_to_original_size = true
dry_run = false

[layout]
x_padding = 3
y_padding = 1
combo_scale = 0.92

[score]
score_fill = #ffffff,#dffcff
score_stroke = #20204aff
score_stroke_width = 0
score_n_fill = #b8b8cfff

[score_shadow]
score_s_fill = #050505ff
score_s_stroke = #000000ff
score_s_stroke_width = 1
score_s_blur = #000000bb
score_s_blur_radius = 3
score_s_blur_spread = 1

[combo_front]
combo_p_fill = #ffffff,#bfffff,#8fffff
combo_p_stroke = #786bec
combo_stroke_width = 6

[combo_back]
combo_b_fill = #8b8a81
combo_b_stroke = #77746eff
combo_b_stroke_width = 2
combo_b_blur = #aaa89fcc
combo_b_blur_radius = 16
combo_b_blur_spread = 2

[combo_non_ap]
combo_n_fill = #ffffffff
combo_n_stroke = #cfd3dcff
combo_n_stroke_width = 6
combo_n_blur = #00000000
combo_n_blur_radius = 0
combo_n_blur_spread = 0

[dot]
dot_as_shape = true
dot_scale = 0.72
dot_shape = square
dot_roundness = 0.35

[judge]
judge_perfect_fill = #bffff8,#d7d8ff,#ffffff
judge_great_fill = #d29cff,#ffe0ff
judge_good_fill = #b7dcff,#5ebeff
judge_bad_fill = #a7ffd4,#5ce3af
judge_miss_fill = #ffffff,#bec8d8
judge_auto_fill = #e9ff9c,#c7eaff
judge_stroke = #151a38cc
judge_stroke_width = 2
judge_blur = #4058ff88
judge_blur_radius = 6
judge_blur_spread = 1

[rank]
rank_s_fill = #ff6bd6,#ffe66d,#69fff0,#8fa8ff,#d98cff
rank_a_fill = #fff7b0,#ffd45c,#c98a22
rank_b_fill = #ffffff,#d8e0e8,#8f9aa8
rank_c_fill = #ffd3a0,#c88446,#7a4327
rank_d_fill = #ffffff,#a9a9a9,#5f5f5f
rank_chr_stroke = #2a2030cc
rank_chr_stroke_width = 2
rank_text_stroke = #2a2030cc
rank_text_stroke_width = 1

[score_ui]
score_ui_glass = #091126e8,#14233cdb,#18203bd6
score_ui_outline = #8bffe2a0
score_ui_track = #030817dc
score_ui_bar = #baf579ee,#58e5c8ee,#48bde8ee
score_ui_text = #a9ffe9,#70d9d0

[life_ui]
life_ui_glass = #091126e8,#102b38db,#171d39d6
life_ui_outline = #8bffe2a0
life_ui_track = #030817dc
life_ui_normal = #b8f36aee,#55df9aee
life_ui_overflow = #8efff2ee,#54bde8ee
life_ui_danger = #ffcc6aee,#ff627fee
life_ui_text = #baffed,#73dcd2

[auto_ui]
auto_ui_glass = #081226e8,#102b38dc,#171d39d8
auto_ui_outline = #76efd5b0
auto_ui_accent = #b9f572,#52dfc4
auto_ui_text = #f7ffff,#b9f7e8

[life_digit]
life_digit_fill = #ffffff,#cfffff
life_digit_n_fill = #b8c2d8
life_digit_s_fill = #101426
life_digit_stroke = #3deaff99
life_digit_stroke_width = 2
life_digit_s_stroke = #05070e
life_digit_s_stroke_width = 1
life_digit_s_blur = #53f7ff99
life_digit_s_blur_radius = 4
life_digit_s_blur_spread = 1
